name: 🐾 PetCare SQL Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: 

jobs:
  tests:
    name: API + SQL + E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout do código ──────────────────────────────────
      - name: 📥 Checkout repositório de testes
        uses: actions/checkout@v4
        with:
          path: petcare-sql-tests

      # ── 2. Checkout da API (repositório separado) ──────────────
      - name: 📥 Checkout petcare-sql-qa (API + banco)
        uses: actions/checkout@v4
        with:
          repository: rebvisconti/petcare-sql-qa
          path: petcare-sql-qa

      # ── 3. Setup Node.js ───────────────────────────────────────
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            petcare-sql-qa/package-lock.json
            petcare-sql-tests/package-lock.json

      # ── 4. Instala dependências da API ─────────────────────────
      - name: 📦 Instala dependências da API
        working-directory: petcare-sql-qa
        run: npm ci

      # ── 5. Instala dependências dos testes ─────────────────────
      - name: 📦 Instala dependências dos testes
        working-directory: petcare-sql-tests
        run: npm ci

      # ── 6. Instala browsers do Playwright ─────────────────────
      - name: 🌐 Instala Playwright browsers
        working-directory: petcare-sql-tests
        run: npx playwright install --with-deps chromium

      # ── 7. Sobe a API em background ────────────────────────────
      - name: 🚀 Sobe o servidor PetCare SQL QA
        working-directory: petcare-sql-qa
        run: npm start &

      # ── 8. Aguarda a API estar pronta ──────────────────────────
      - name: ⏳ Aguarda API responder em localhost:3002
        run: |
          echo "Aguardando API..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3002/estatisticas > /dev/null; then
              echo "✅ API pronta!"
              break
            fi
            echo "Tentativa $i/15..."
            sleep 2
          done

      # ── 9. Executa os testes ───────────────────────────────────
      - name: 🧪 Executa testes Playwright
        working-directory: petcare-sql-tests
        run: npm test
        env:
          CI: true

      # ── 10. Publica relatório HTML ─────────────────────────────
      - name: 📊 Upload relatório de testes
        uses: actions/upload-artifact@v4
        if: always() # publica mesmo se os testes falharem
        with:
          name: playwright-report
          path: petcare-sql-tests/playwright-report/
          retention-days: 30
